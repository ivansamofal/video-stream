# 10 MB shared memory — enough for ~160 K unique IPs per zone
limit_req_zone $binary_remote_addr zone=auth:10m    rate=30r/m;
limit_req_zone $binary_remote_addr zone=api:10m     rate=120r/m;
limit_req_status 429;

upstream api {
    server api:8000;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;

    client_max_body_size 2G;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Auth endpoints — stricter zone, burst allows a short flurry then hard-stops
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # All other API endpoints
    location /api/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Vue SPA + static assets
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
